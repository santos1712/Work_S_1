<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marwan Santos</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Cairo',sans-serif;
}

body{
  min-height:100vh;
  background:
    linear-gradient(rgba(9,0,20,0.55), rgba(9,0,20,0.55)),
    url('https://postimg.cc/R3BF646s') center center / cover no-repeat fixed;
  overflow-x:hidden;
  color:white;
  padding:30px;
  position:relative;
}

body::before{
  content:'';
  position:fixed;
  width:500px;
  height:500px;
  background:rgba(255,0,200,0.18);
  filter:blur(120px);
  top:-150px;
  right:-150px;
  z-index:-1;
}

body::after{
  content:'';
  position:fixed;
  width:400px;
  height:400px;
  background:rgba(0,255,255,0.12);
  filter:blur(120px);
  bottom:-120px;
  left:-120px;
  z-index:-1;
}

.container{
  max-width:1200px;
  margin:auto;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:20px;
  margin-bottom:40px;
}

.logo{
  font-size:38px;
  font-weight:700;
  text-shadow:
    0 0 10px #ff00ff,
    0 0 20px #ff00ff,
    0 0 40px #ff00ff;
}

.clock{
  font-size:22px;
  background:rgba(255,255,255,0.05);
  padding:14px 22px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
}

.search-box{
  margin-bottom:35px;
}

.search-box input{
  width:100%;
  padding:18px 24px;
  border:none;
  outline:none;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:17px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 20px rgba(255,0,255,0.15);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:22px;
}

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:25px;
  padding:24px;
  backdrop-filter:blur(12px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 25px rgba(255,0,255,0.2);
}

.card h2{
  margin-bottom:18px;
  color:#00ffff;
}

.links{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.link-item{
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.05);
  padding:12px 14px;
  border-radius:14px;
  display:flex;
  align-items:center;
  gap:10px;
  transition:0.25s;
}

.link-item:hover{
  background:rgba(0,255,255,0.12);
}

.link-favicon{
  width:20px;
  height:20px;
  border-radius:4px;
}

.link-name{
  flex:1;
}

.link-del{
  background:none;
  border:none;
  color:#ff4d6d;
  cursor:pointer;
  font-size:14px;
}

.add-btn{
  position:fixed;
  bottom:25px;
  left:25px;
  width:68px;
  height:68px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  font-size:34px;
  color:white;
  background:linear-gradient(135deg,#ff00ff,#00ffff);
  box-shadow:
    0 0 20px rgba(255,0,255,0.5),
    0 0 35px rgba(0,255,255,0.4);
  transition:0.3s;
}

.add-btn:hover{
  transform:scale(1.1) rotate(90deg);
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  width:90%;
  max-width:420px;
  background:#120021;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  padding:28px;
}

.modal-content h3{
  margin-bottom:18px;
  text-align:center;
  color:#00ffff;
}

.modal-content input{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border:none;
  outline:none;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  color:white;
}

.modal-content button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#ff00ff,#00ffff);
  color:white;
  font-size:16px;
  cursor:pointer;
}

.footer{
  text-align:center;
  margin-top:50px;
  opacity:0.5;
}

@keyframes slideUp{
  from{
    opacity:0;
    transform:translateY(25px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

.link-new{
  animation:slideUp 0.35s ease;
}

</style>
</head>

<body>

<div class="container">

  <div class="top">
    <div class="logo">⚡ Marwan Santos</div>
    <div class="clock" id="clock">00:00:00</div>
  </div>

  <div class="search-box">
    <input type="text" id="search" placeholder="ابحث في جوجل...">
  </div>

  <div class="grid" id="grid">

    <div class="card">
      <h2>🎮 Gaming</h2>

      <div class="links">

        <a class="link-item" href="https://store.steampowered.com" target="_blank">
          <img class="link-favicon" src="https://www.google.com/s2/favicons?domain=store.steampowered.com&sz=32">
          <span class="link-name">Steam</span>
          <button class="link-del" onclick="deleteLink(event,this)">✕</button>
        </a>

        <a class="link-item" href="https://playvalorant.com" target="_blank">
          <img class="link-favicon" src="https://www.google.com/s2/favicons?domain=playvalorant.com&sz=32">
          <span class="link-name">Valorant</span>
          <button class="link-del" onclick="deleteLink(event,this)">✕</button>
        </a>

        <a class="link-item" href="https://store.epicgames.com" target="_blank">
          <img class="link-favicon" src="https://www.google.com/s2/favicons?domain=store.epicgames.com&sz=32">
          <span class="link-name">Epic Games</span>
          <button class="link-del" onclick="deleteLink(event,this)">✕</button>
        </a>

      </div>
    </div>

    <div class="card">
      <h2>💻 Coding</h2>

      <div class="links">

        <a class="link-item" href="https://github.com" target="_blank">
          <img class="link-favicon" src="https://www.google.com/s2/favicons?domain=github.com&sz=32">
          <span class="link-name">GitHub</span>
          <button class="link-del" onclick="deleteLink(event,this)">✕</button>
        </a>

        <a class="link-item" href="https://workers.cloudflare.com" target="_blank">
          <img class="link-favicon" src="https://www.google.com/s2/favicons?domain=cloudflare.com&sz=32">
          <span class="link-name">Cloudflare</span>
          <button class="link-del" onclick="deleteLink(event,this)">✕</button>
        </a>

        <a class="link-item" href="https://replit.com" target="_blank">
          <img class="link-favicon" src="https://www.google.com/s2/favicons?domain=replit.com&sz=32">
          <span class="link-name">Replit</span>
          <button class="link-del" onclick="deleteLink(event,this)">✕</button>
        </a>

      </div>
    </div>

  </div>

  <div class="footer">
    Marwan Santos
  </div>

</div>

<button class="add-btn" id="openModal">+</button>

<div class="modal" id="modal">

  <div class="modal-content">
    <h3>إضافة موقع جديد</h3>

    <input type="text" id="siteName" placeholder="اسم الموقع">

    <input type="url" id="siteUrl" placeholder="لينك الموقع">

    <button onclick="addWebsite()">إضافة</button>
  </div>

</div>

<script>

function updateClock(){
  document.getElementById('clock').innerText =
    new Date().toLocaleTimeString('ar-EG');
}

setInterval(updateClock,1000);
updateClock();

document.getElementById('search').addEventListener('keypress',function(e){

  if(e.key === 'Enter'){
    window.location.href =
      `https://www.google.com/search?q=${this.value}`;
  }

});

const modal = document.getElementById('modal');

document.getElementById('openModal').onclick = () => {
  modal.style.display = 'flex';
};

modal.onclick = (e) => {
  if(e.target === modal){
    modal.style.display = 'none';
  }
};

function getHostname(url){

  try{
    return new URL(url).hostname;
  }

  catch{
    return '';
  }

}

function createLink(name,url){

  const hostname = getHostname(url);

  const link = document.createElement('a');

  link.className = 'link-item';
  link.href = url;
  link.target = '_blank';

  link.innerHTML = `
    <img class="link-favicon"
    src="https://www.google.com/s2/favicons?domain=${hostname}&sz=32">

    <span class="link-name">${name}</span>

    <button class="link-del"
    onclick="deleteLink(event,this)">✕</button>
  `;

  return link;
}

function addWebsite(){

  const name = document.getElementById('siteName').value.trim();
  const url  = document.getElementById('siteUrl').value.trim();

  if(!name || !url){
    alert('اكتب البيانات كاملة');
    return;
  }

  let card = document.getElementById('custom-links');

  if(!card){

    card = document.createElement('div');

    card.className = 'card';
    card.id = 'custom-links';

    card.innerHTML = `
      <h2>⭐ مواقعك</h2>
      <div class="links"></div>
    `;

    document.getElementById('grid').appendChild(card);
  }

  const container = card.querySelector('.links');

  const link = createLink(name,url);

  link.classList.add('link-new');

  container.appendChild(link);

  saveLinks();

  document.getElementById('siteName').value = '';
  document.getElementById('siteUrl').value = '';

  modal.style.display = 'none';
}

function deleteLink(event,btn){

  event.preventDefault();
  event.stopPropagation();

  const link = btn.closest('.link-item');

  link.style.opacity = '0';
  link.style.transform = 'scale(0.7)';

  setTimeout(() => {

    link.remove();

    saveLinks();

  },250);
}

function saveLinks(){

  const card = document.getElementById('custom-links');

  if(!card){
    localStorage.removeItem('marwanLinks');
    return;
  }

  const links = [];

  card.querySelectorAll('.link-item').forEach(link => {

    links.push({
      name: link.querySelector('.link-name').textContent,
      url: link.href
    });

  });

  localStorage.setItem(
    'marwanLinks',
    JSON.stringify(links)
  );
}

function loadLinks(){

  const saved =
    JSON.parse(localStorage.getItem('marwanLinks'));

  if(!saved || !saved.length) return;

  const card = document.createElement('div');

  card.className = 'card';
  card.id = 'custom-links';

  card.innerHTML = `
    <h2>⭐ مواقعك</h2>
    <div class="links"></div>
  `;

  document.getElementById('grid').appendChild(card);

  const container = card.querySelector('.links');

  saved.forEach(site => {

    const link = createLink(site.name,site.url);

    container.appendChild(link);

  });

}

loadLinks();

</script>

</body>
</html>
